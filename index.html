<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food</title>
    <script src="index.js" defer></script>
    <link rel="stylesheet" href="index.css">

    <link
      href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://kit.fontawesome.com/9ac48ea91b.js" crossorigin="anonymous"></script>


  </head>
  <body class="bg-gray-200 m-0 p-0">


                          <!-- Header section  -->


    <header class="header shadow-lg fixed w-full z-50">
      <nav class="w-full bg-white">
        <div class="container mx-auto">
          <div class="flex items-center justify-between relative">
            <div>
              <a href="#" class="w-max">
                <img src="logo.png" alt="Restaurant" class="text-white w-28">
              </a>
            </div>
            <div class="cart text-2xl md:text-3xl cursor-pointer p-2">
              <i class="fa-solid fa-cart-shopping"></i>
            </div>
            <div class="toggle text-3xl cursor-pointer md:hidden px-16">
              <i class="fa-solid fa-bars"></i>
              <i class="fa-solid fa-x  hidden"></i>
            </div>
            <div class="flex flex-col md:flex-row md:static absolute justify-between top-28 md:flex left-1/2 md:left-0 -translate-x-1/2 md:translate-x-0 h-0 md:h-auto duration-700 overflow-hidden menu rounded-xl rounded-t-none md:float-right md:w-1/2 ease-linear">
              <a href="#home" class="bg-white md:border-gray-200 border-white border-2 px-14 py-3 md:px-8 md:py-3.5 text-xl md:rounded-xl hover:bg-gray-300 hover:text-white  duration-700 text-center select-none">Home</a><hr>
              <a href="#food" class="bg-white md:border-gray-200 border-white border-2 px-14 py-3 md:px-8 md:py-3.5 text-xl md:rounded-xl hover:bg-gray-300 hover:text-white  duration-700 text-center select-none">Foods</a><hr>
              <a href="#conatact" class="bg-white md:border-gray-200 border-white border-2 px-14 py-3 md:px-8 md:py-3.5 text-xl md:rounded-xl hover:bg-gray-300 hover:text-white rounded-b-xl duration-700 text-center select-none">Contact</a>
            </div>
          </div>
        </div>
      </nav>
    </header>


                        <!-- home section  -->


    <section id="home" class="flex justify-center pt-28">
      <div class="container">
        <div class="h-max bg-gray-300 flex flex-col md:flex-row pb-10">
          <div class="left  w-full flex flex-col justify-center py-11 md:w-1/2">
            <h2 class="text-transparent text-center text-6xl bg-clip-text bg-gradient-to-r from-black to-slate-400 uppercase select-none">start your day</h2>
            <h2 class="text-transparent text-center text-5xl bg-clip-text bg-gradient-to-r from-slate-400 to-black uppercase select-none">with coffee</h2>
          </div>
          <div class="right w-full flex justify-center py-5 md:w-1/2">
            <img src="coffe cup.png" class="w-1/2 md:w-full">
          </div>
        </div>
      </div>
    </section>



                        <!-- Food section  -->



    <section id="food" class="w-full flex justify-center pt-28">
      <div class="container">
        <div class="food flex flex-wrap justify-center bg-gray-300">
          <div class="food-cards w-80 px-5 py-7 bg-white mb-4 md:w-96 md:px-1 lg:w-1/3 lg:px-10">
            <img src="burger.jpg" class="w-full h-60 rounded-xl -translate-x-2 hover:translate-x-0 duration-500 md:h-72">
            <h2 class="food-name text-lg text-gray-500 pt-2">Burger</h2>
            <h3 class="price text-lg text-gray-500 pb-2"><del>180</del> 150 TK</h3>
            <button class="cart text-lg bg-red-600 rounded-md px-3 py-2 w-full text-center text-white border-2 border-red-600 hover:bg-transparent hover:text-red-600 duration-700 active:bg-gray-300 select-none">Add To Cart</button>
          </div>
          <div class="food-cards w-80 px-5 py-7 bg-white mb-4 md:w-96 md:px-1 lg:w-1/3 lg:px-10">
            <img src="pizza.jpg" class="w-full h-60 rounded-xl -translate-x-2 hover:translate-x-0 duration-500 md:h-72">
            <h2 class="food-name text-lg text-gray-500 pt-2">Pizza</h2>
            <h3 class="price text-lg text-gray-500 pb-2"><del></del> 350 TK</h3>
            <button class="cart text-lg bg-red-600 rounded-md px-3 py-2 w-full text-center text-white border-2 border-red-600 hover:bg-transparent hover:text-red-600 duration-700 active:bg-gray-300 select-none">Add To Cart</button>
          </div>
          <div class="food-cards w-80 px-5 py-7 bg-white mb-4 md:w-96 md:px-1 lg:w-1/3 lg:px-10">
            <img src="chicken-biriyani.jpg" class="w-full h-60 rounded-xl -translate-x-2 hover:translate-x-0 duration-500 md:h-72">
            <h2 class="food-name text-lg text-gray-500 pt-2">Chicken Biriyani</h2>
            <h3 class="price text-lg text-gray-500 pb-2"><del></del> 220 TK</h3>
            <button class="cart text-lg bg-red-600 rounded-md px-3 py-2 w-full text-center text-white border-2 border-red-600 hover:bg-transparent hover:text-red-600 duration-700 active:bg-gray-300 select-none">Add To Cart</button>
          </div>
          <div class="food-cards w-80 px-5 py-7 bg-white mb-4 md:w-96 md:px-1 lg:w-1/3 lg:px-10">
            <img src="chicken-fried-rice.jpg" class="w-full h-60 rounded-xl -translate-x-2 hover:translate-x-0 duration-500 md:h-72">
            <h2 class="food-name text-lg text-gray-500 pt-2">Chicken Fried Rice</h2>
            <h3 class="price text-lg text-gray-500 pb-2"><del></del> 120 TK</h3>
            <button class="cart text-lg bg-red-600 rounded-md px-3 py-2 w-full text-center text-white border-2 border-red-600 hover:bg-transparent hover:text-red-600 duration-700 active:bg-gray-300 select-none">Add To Cart</button>
          </div>
          <div class="food-cards w-80 px-5 py-7 bg-white mb-4 md:w-96 md:px-1 lg:w-1/3 lg:px-10">
            <img src="chicken-wings.jpg" class="w-full h-60 rounded-xl -translate-x-2 hover:translate-x-0 duration-500 md:h-72">
            <h2 class="food-name text-lg text-gray-500 pt-2">Chicken Wings</h2>
            <h3 class="price text-lg text-gray-500 pb-2"><del></del> 300 TK</h3>
            <button class="cart text-lg bg-red-600 rounded-md px-3 py-2 w-full text-center text-white border-2 border-red-600 hover:bg-transparent hover:text-red-600 duration-700 active:bg-gray-300 select-none">Add To Cart</button>
          </div>
        </div>
      </div>
    </section>



                      <!-- Cart section  -->

    



  </body>
</html>
